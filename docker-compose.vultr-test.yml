# ── NexusOps · Vultr Test Deployment ─────────────────────────────────────────
# Single-server, HTTP-only, no domain required.
# Access via http://<server-ip>
#
# Usage:
#   docker compose -f docker-compose.vultr-test.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Web frontend (Next.js) ──────────────────────────────────────────────────
  web:
    image: nexusops/web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # SERVER_IP is resolved at build time. If unset, the frontend now
        # derives the API host from window.location at runtime (see trpc.ts),
        # so leaving this blank is safe and works on any host.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      # Used server-side (SSR + /api/trpc proxy) to reach the API container
      # over the Docker internal network — never exposed to the browser.
      API_INTERNAL_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # Use wget exit code directly — BusyBox wget --spider exits 0 on any 2xx/3xx,
      # no need to pipe through grep (which was broken in Alpine).
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── API (Fastify / tRPC) ────────────────────────────────────────────────────
  api:
    image: nexusops/api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env.production
    environment:
      # Raise bcrypt concurrency so login throughput scales with the thread pool.
      # At BCRYPT_CONCURRENCY=8 (default) we cap at ~8 logins/s; 32 matches
      # a 4-core server running 8 threads each.
      BCRYPT_CONCURRENCY: "32"
      LIBUV_THREADPOOL_SIZE: "32"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexusops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nexusops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Bind to loopback only — API still reaches postgres via Docker DNS `postgres:5432`.
    # For admin/chaos DB access from your laptop, use SSH: ssh -L 5433:127.0.0.1:5432 root@<host>
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD" --save 60 1;
      else
        redis-server --save 60 1;
      fi'
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping;
          else
            redis-cli ping;
          fi
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Meilisearch ─────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch-data:/meili_data
    # Image has wget; curl is often missing (healthcheck was failing and blocking the whole stack).
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:7700/health | grep -q available || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:

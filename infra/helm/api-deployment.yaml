# NexusOps API — Kubernetes Deployment
# Requires: secrets/nexusops-api-env (create with kubectl create secret generic)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexusops-api
  labels:
    app: nexusops-api
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusops-api
  template:
    metadata:
      labels:
        app: nexusops-api
        component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: nexusops/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: nexusops-api-env
          env:
            - name: PORT
              value: "3001"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: nexusops-api
  labels:
    app: nexusops-api
spec:
  selector:
    app: nexusops-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP

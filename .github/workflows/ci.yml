name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @coheronconnect/types --filter @coheronconnect/payroll-math --filter @coheronconnect/db --filter @coheronconnect/metrics --filter @coheronconnect/ui --filter @coheronconnect/api build

      - name: Type check API
        run: pnpm --filter @coheronconnect/api lint

      - name: Type check Web
        run: cd apps/web && npx tsc --noEmit

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coheronconnect
          POSTGRES_PASSWORD: coheronconnect_test
          POSTGRES_DB: coheronconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @coheronconnect/types --filter @coheronconnect/payroll-math --filter @coheronconnect/db --filter @coheronconnect/metrics --filter @coheronconnect/ui --filter @coheronconnect/api build

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://coheronconnect:coheronconnect_test@localhost:5432/coheronconnect_test
        run: pnpm db:migrate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://coheronconnect:coheronconnect_test@localhost:5432/coheronconnect_test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: test-secret-32-chars-minimum-here
          ENCRYPTION_KEY: test-encryption-32-chars-minimum
          NODE_ENV: test
        run: pnpm test

  # ── E2E (Playwright) — full app smoke; globalSetup uses db:migrate + seed ─────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: coheronconnect
          POSTGRES_PASSWORD: coheronconnect_test
          POSTGRES_DB: coheronconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: test_master_key
          MEILI_ENV: development
        ports:
          - 7700:7700

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (API + Web + deps)
        run: pnpm --filter @coheronconnect/types --filter @coheronconnect/payroll-math --filter @coheronconnect/db --filter @coheronconnect/metrics --filter @coheronconnect/ui --filter @coheronconnect/api --filter @coheronconnect/web build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E
        env:
          CI: true
          DATABASE_URL: postgresql://coheronconnect:coheronconnect_test@localhost:5432/coheronconnect_test
          REDIS_URL: redis://localhost:6379
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_KEY: test_master_key
          AUTH_SECRET: test-secret-32-chars-minimum-here
          ENCRYPTION_KEY: test-encryption-32-chars-minimum
          # AES-256 KEK for services/encryption.ts (encryptSecret): used by the
          # TOTP MFA enroll flow and integration-credential wrapping. Set here so
          # CI doesn't depend on the playwright.config.ts fallback default.
          APP_SECRET: test-app-secret-32-chars-minimum-here
          NODE_ENV: test
        run: pnpm exec playwright test --reporter=line

  # ── Build Docker Images ─────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Auto-deploy to Vultr (immutable SHA tag) ─────────────────────────────────
  # Runs only after build succeeds on main, so the images for this exact commit
  # are guaranteed present in GHCR. Deploys the short SHA — never the moving
  # `latest` tag — so the running container can be pinned to this commit and the
  # remote script can verify it. Skips automatically if deploy secrets are absent.
  deploy:
    name: Deploy to Vultr
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy secrets present
        id: gate
        env:
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
          VULTR_SSH_PRIVATE_KEY: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -n "$VULTR_HOST" && -n "$VULTR_SSH_PRIVATE_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VULTR_HOST / VULTR_SSH_PRIVATE_KEY not set — skipping auto-deploy."
          fi

      - name: Install rsync
        if: steps.gate.outputs.ready == 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rsync openssh-client

      - name: Start ssh-agent
        if: steps.gate.outputs.ready == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}

      - name: Trust host key
        if: steps.gate.outputs.ready == 'true'
        env:
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VULTR_HOST" >> ~/.ssh/known_hosts

      - name: Deploy (pinned short SHA)
        if: steps.gate.outputs.ready == 'true'
        env:
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
          DEPLOY_MODE: pull
          GHCR_READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          export NEXUSOPS_IMAGE_REPO="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          export NEXUSOPS_IMAGE_TAG="$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "Deploying immutable tag: $NEXUSOPS_IMAGE_TAG"
          bash scripts/push-to-vultr.sh

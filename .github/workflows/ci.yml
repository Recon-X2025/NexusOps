name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @nexusops/types --filter @nexusops/db --filter @nexusops/ui build

      - name: Type check API
        run: pnpm --filter @nexusops/api lint

      - name: Type check Web
        run: cd apps/web && npx tsc --noEmit

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexusops
          POSTGRES_PASSWORD: nexusops_test
          POSTGRES_DB: nexusops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter @nexusops/types --filter @nexusops/db --filter @nexusops/ui --filter @nexusops/api build

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://nexusops:nexusops_test@localhost:5432/nexusops_test
        run: pnpm db:migrate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://nexusops:nexusops_test@localhost:5432/nexusops_test
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: test-secret-32-chars-minimum-here
          ENCRYPTION_KEY: test-encryption-32-chars-minimum
          NODE_ENV: test
        run: pnpm test

  # ── E2E (Playwright) — full app smoke; globalSetup uses db:migrate + seed ─────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexusops
          POSTGRES_PASSWORD: nexusops_test
          POSTGRES_DB: nexusops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: test_master_key
          MEILI_ENV: development
        ports:
          - 7700:7700

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (API + Web + deps)
        run: pnpm --filter @nexusops/types --filter @nexusops/db --filter @nexusops/ui --filter @nexusops/api --filter @nexusops/web build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E
        env:
          CI: true
          DATABASE_URL: postgresql://nexusops:nexusops_test@localhost:5432/nexusops_test
          REDIS_URL: redis://localhost:6379
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_KEY: test_master_key
          AUTH_SECRET: test-secret-32-chars-minimum-here
          ENCRYPTION_KEY: test-encryption-32-chars-minimum
          NODE_ENV: test
        run: pnpm exec playwright test --reporter=line

  # ── Build Docker Images ─────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy hint (Vultr)
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "Pushed ghcr.io/${REPO_LC}/web:latest and .../api:latest"
          echo "Manual deploy: NEXUSOPS_IMAGE_REPO=ghcr.io/${REPO_LC} NEXUSOPS_IMAGE_TAG=latest bash scripts/push-to-vultr.sh"
          echo "Or GitHub: Actions → Deploy Vultr (workflow_dispatch) after adding secrets (see docs/Deployment_Plan.md)."

services:
  # ── Application ────────────────────────────────────────────────────────────
  web:
    image: coheronconnect/web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:3001
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.coheronconnect.yourdomain.com}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    image: coheronconnect/api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  migrator:
    image: coheronconnect/api:latest
    command: ["node", "-e", "require('./dist/migrate.js')"]
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coheronconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-coheronconnect}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coheronconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── DPDP sweep driver ───────────────────────────────────────────────────────
  # The Temporal worker (apps/worker) is not deployed here, so its
  # dpdp-sweep-schedule never registers. This sidecar drives the same work by
  # POSTing the API's internal sweep endpoint on a fixed cadence. On the default
  # compose network the API's /internal guard (index.ts) admits it without a
  # token. Interval is DPDP_SWEEP_INTERVAL_SECONDS (default 3600 = 1h).
  dpdp-sweeper:
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    environment:
      SWEEP_INTERVAL_SECONDS: ${DPDP_SWEEP_INTERVAL_SECONDS:-3600}
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          sleep "$$SWEEP_INTERVAL_SECONDS"
          if curl -fsS -m 300 -X POST http://api:3001/internal/dpdp/sweep -H 'Content-Type: application/json' -d '{}'; then
            echo "[dpdp-sweeper] sweep ok $$(date -u +%FT%TZ)"
          else
            echo "[dpdp-sweeper] sweep failed $$(date -u +%FT%TZ)"
          fi
        done
    depends_on:
      api:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Traefik reverse proxy ───────────────────────────────────────────────────
  traefik:
    image: traefik:v3
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
  minio-data:
  letsencrypt-data:

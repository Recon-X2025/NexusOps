# NexusOps Helm Chart Values
# Override with your own values.yaml

global:
  imageRegistry: ""
  imagePullSecrets: []

# ── Web (Next.js) ────────────────────────────────────────────────────────────
web:
  replicaCount: 2
  image:
    repository: nexusops/web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── API (Fastify) ─────────────────────────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: nexusops/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: nexusops.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: web
    - host: api.nexusops.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls:
    - secretName: nexusops-tls
      hosts:
        - nexusops.yourdomain.com
        - api.nexusops.yourdomain.com

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: nexusops
    password: changeme-in-production
    database: nexusops
  primary:
    persistence:
      enabled: true
      size: 20Gi
  # Set enabled: false to use external DB
  # externalDatabase:
  #   host: your-rds-endpoint.amazonaws.com
  #   port: 5432
  #   database: nexusops

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: true
    password: changeme-in-production
  master:
    persistence:
      enabled: true
      size: 5Gi

# ── Meilisearch ───────────────────────────────────────────────────────────────
meilisearch:
  enabled: true
  environment:
    MEILI_ENV: production
  persistence:
    enabled: true
    size: 10Gi

# ── MinIO ─────────────────────────────────────────────────────────────────────
minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 50Gi

# ── Secrets ────────────────────────────────────────────────────────────────────
secrets:
  databaseUrl: "postgresql://nexusops:changeme@localhost:5432/nexusops"
  redisUrl: "redis://:changeme@localhost:6379"
  jwtSecret: "change-me-jwt-secret-32-chars-min"
  nextauthSecret: "change-me-nextauth-secret"
  anthropicApiKey: ""
  smtpHost: "smtp.example.com"
  smtpPort: "587"
  smtpUser: ""
  smtpPassword: ""
  smtpFrom: "no-reply@example.com"

# ── Uploads PVC ────────────────────────────────────────────────────────────────
uploads:
  pvcSize: "5Gi"

# ── Temporal Worker ────────────────────────────────────────────────────────────
temporal:
  enabled: true
  address: "temporal:7233"
  namespace: "default"
  taskQueue: "nexusops-main"
  worker:
    replicaCount: 1

# ── Worker (Temporal workflow runner) ─────────────────────────────────────────
worker:
  enabled: true
  image:
    repository: nexusops/worker
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ── Environment variables injected into pods ──────────────────────────────────
env:
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"

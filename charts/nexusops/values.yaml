# NexusOps Helm Chart Values
# Override with your own values.yaml

global:
  imageRegistry: ""
  imagePullSecrets: []

# ── Web (Next.js) ────────────────────────────────────────────────────────────
web:
  replicaCount: 2
  image:
    repository: nexusops/web
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── API (Fastify) ─────────────────────────────────────────────────────────────
api:
  replicaCount: 2
  image:
    repository: nexusops/api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: nexusops.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: web
    - host: api.nexusops.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service: api
  tls:
    - secretName: nexusops-tls
      hosts:
        - nexusops.yourdomain.com
        - api.nexusops.yourdomain.com

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: nexusops
    password: changeme-in-production
    database: nexusops
  primary:
    persistence:
      enabled: true
      size: 20Gi
  # Set enabled: false to use external DB
  # externalDatabase:
  #   host: your-rds-endpoint.amazonaws.com
  #   port: 5432
  #   database: nexusops

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: true
    password: changeme-in-production
  master:
    persistence:
      enabled: true
      size: 5Gi

# ── Meilisearch ───────────────────────────────────────────────────────────────
meilisearch:
  enabled: true
  environment:
    MEILI_ENV: production
  persistence:
    enabled: true
    size: 10Gi

# ── MinIO ─────────────────────────────────────────────────────────────────────
minio:
  enabled: true
  mode: standalone
  persistence:
    enabled: true
    size: 50Gi

# ── Secret configuration ───────────────────────────────────────────────────────
secret:
  # Create secret externally and reference here, or set values directly
  authSecret: ""
  encryptionKey: ""
  anthropicApiKey: ""

# ── Environment variables injected into pods ──────────────────────────────────
env:
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"

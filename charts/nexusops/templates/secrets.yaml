apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nexusops.fullname" . }}-secrets
  labels:
    {{- include "nexusops.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | default "" | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | default "" | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | default "" | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | default "" | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | default "" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | default "" | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | default "587" | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | default "" | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | default "" | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | default "" | quote }}
